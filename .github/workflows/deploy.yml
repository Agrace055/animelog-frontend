name: Build and Deploy Frontend

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/animelog-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"

            SHORT_SHA="${{ steps.sha.outputs.short }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${SHORT_SHA}"

            echo ">>> Pulling image: ${IMAGE}"
            docker pull "${IMAGE}"

            # Update FRONTEND_TAG in .deploy.env (create file if missing)
            touch .deploy.env
            if grep -q "^FRONTEND_TAG=" .deploy.env; then
              sed -i "s|^FRONTEND_TAG=.*|FRONTEND_TAG=main-${SHORT_SHA}|" .deploy.env
            else
              echo "FRONTEND_TAG=main-${SHORT_SHA}" >> .deploy.env
            fi

            # Restart only the nginx service and wait for health check
            docker compose --env-file .env --env-file .deploy.env \
              up -d --no-deps --wait nginx

            echo ">>> Deployment complete: main-${SHORT_SHA}"

            # Clean up: keep only 3 most recent main-* tags locally
            docker images "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" \
              --format "{{.Tag}}" \
              | grep "^main-" \
              | sort -r \
              | tail -n +4 \
              | xargs -I{} docker rmi "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:{}" 2>/dev/null \
              || true
