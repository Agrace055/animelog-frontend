worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;
    client_max_body_size 5m;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=minio_cache:50m max_size=1g inactive=7d use_temp_path=off;
    server_tokens off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_prefer_server_ciphers off;

    server {
        listen 80;
        server_name animelog.top www.animelog.top console.animelog.top;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name animelog.top www.animelog.top;

        ssl_certificate /etc/nginx/certs/animelog.top/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/animelog.top/privkey.pem;

        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        location /img/ {
            proxy_pass http://minio:9000/anime-assets/;
            proxy_cache minio_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_key "$uri$is_args$args";
            add_header Cache-Control "public, max-age=2592000";
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-xss-protection;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
        }

        location /api/ {
            proxy_pass http://app:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location ^~ /console-admin {
            return 404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name console.animelog.top;

        ssl_certificate /etc/nginx/certs/animelog.top/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/animelog.top/privkey.pem;

        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        location /img/ {
            proxy_pass http://minio:9000/anime-assets/;
            proxy_cache minio_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_key "$uri$is_args$args";
            add_header Cache-Control "public, max-age=2592000";
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-xss-protection;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
        }

        location /api/ {
            proxy_pass http://app:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
